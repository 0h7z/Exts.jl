name: CI
on:
  workflow_dispatch: ~
  pull_request:
    branches:
      - "master"
  push:
    branches:
      - "master"
    tags:
      - "*"
defaults:
  run:
    shell: bash
env:
  JULIA_NUM_THREADS: auto,auto
jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        julia-version:
          - "1.9"
          - "1.10"
          - "1.11"
          - "pre"
          - "1.11-nightly"
          - "1.12-nightly"
          - "1.13-nightly"
        include:
          - { experimental: false }
          - { experimental: true, julia-version: "1.11-nightly" }
          - { experimental: true, julia-version: "1.12-nightly" }
          - { experimental: true, julia-version: "1.13-nightly" }
    needs: data
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v2
        with:
          show-versioninfo: true
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/julia-buildpkg@v1
        with:
          ignore-no-cache: true
          localregistry: https://github.com/0h7z/0hjl.git
      - uses: actions/cache@v4
        with:
          enableCrossOsArchive: true
          path: spAll-gal-v5_4_45.7z
          key: spAll-gal-v5_4_45.7z
        if: ${{ matrix.julia-version == '1.11' }}
        id: cache
      - run: |
          7z l -ba -slt spAll-gal-v5_4_45.7z
          7z x -o"test" spAll-gal-v5_4_45.7z
        if: ${{ steps.cache.outputs.cache-hit }}
      - uses: julia-actions/julia-runtest@v1
      - uses: heptazhou/julia-codecov@v1
        with:
          dirs: src:ext
      - uses: codecov/codecov-action@v4
        with:
          file: lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@v2
        with:
          show-versioninfo: true
          version: "1"
      - uses: julia-actions/julia-buildpkg@v1
        with:
          ignore-no-cache: true
          localregistry: https://github.com/0h7z/0hjl.git
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/cache@v4
        with:
          enableCrossOsArchive: true
          lookup-only: true
          path: spAll-gal-v5_4_45.7z
          key: spAll-gal-v5_4_45.7z
        id: cache
      - run: curl -LO $REPO/releases/download/v0.2.15/spAll-gal-v5_4_45.7z
        env:
          REPO: https://github.com/0h7z/Exts.jl
        if: ${{ !steps.cache.outputs.cache-hit }}
